<!doctype html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>급식 공지</title>
    <style>
        @font-face {
            font-family: 'SandolB';
            src: url('./ttf/AppleSDGothicNeoM.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'SandolL';
            /* 내가 붙일 이름 */
            src: url('./ttf/AppleSDGothicNeoL.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'SandolL', sans-serif;
        }

        body {
            -ms-overflow-style: none;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        /* ------------------------------
       화면 비율 고려한 vw 기반 타이포 & 여백
       - 최대/최소 가독성을 위해 clamp() 사용
       - 오른쪽의 "○학생 먼저입니다" 표시는 제외
       ------------------------------ */

        :root {
            /* 기본 폭 비율: 모바일 한 면 기준 92vw 카드 */
            --page-w: min(92vw, 520px);
            /* 너무 커지는 것 방지 */

            /* 타이포 크기 (vw 중심) */
            --title-fs: clamp(22px, 8vw, 42px);
            --label-fs: clamp(14px, 4.8vw, 22px);
            --menu-fs: clamp(14px, 4.2vw, 22px);

            /* 여백 (vw 중심) */
            --outer-pad-y: clamp(16px, 5vw, 32px);
            --outer-pad-x: clamp(18px, 6vw, 36px);
            --section-gap: clamp(16px, 4.8vw, 28px);
            --line-gap: clamp(6px, 2.2vw, 12px);
            --label-w: clamp(48px, 14vw, 76px);
            /* 왼쪽 라벨 고정폭 */
        }

        * {
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #2b2b2b;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: clamp(12px, 3.2vw, 24px) 0;
        }

        .card {
            width: var(--page-w);
            padding: var(--outer-pad-y) var(--outer-pad-x);
            background: #fff;
        }

        .container {
            display: grid;
            place-items: center;
            /* 가로·세로 모두 중앙 */
            height: 100vh;
        }

        /* 헤더 (가운데 정렬 타이틀만) */
        .header {
            text-align: center;
            margin-bottom: clamp(12px, 4vw, 22px);
        }

        .title {
            font-size: var(--title-fs);
            /* font-weight: 700; */
            /* letter-spacing: 0.02em; */
            font-family: 'SandolB', sans-serif;
        }

        /* 본문: 왼쪽 라벨, 오른쪽 메뉴 */
        .section {
            display: flex;
            align-items: flex-start;
            gap: clamp(12px, 3.6vw, 20px);
            margin-bottom: var(--section-gap);
        }

        .label {
            flex: 0 0 var(--label-w);
            font-size: var(--label-fs);
            /* font-weight: 600; */
            padding-top: 0.03em;
        }

        input {
            font-family: 'SandolL', sans-serif;
            font-size: var(--label-fs);
        }

        .menu {
            flex: 1;
            font-size: var(--menu-fs);
            line-height: 1.5;
        }

        .menu p {
            margin: 0 0 2px 0;
        }

        /* 마지막 섹션은 여백 제거 */
        .section:last-of-type {
            margin-bottom: 0;
        }

        /* 세로로 긴 화면에서 상하 여백을 조금 늘림 */
        @media (width < height) {

            /* :root {
                --outer-pad-y: clamp(20px, 6vw, 40px);
            } */
            .card {
                align-items: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <main class="card" role="main">
            <header class="header">
                <h1 class="title" id="title">1.5 급식</h1>
                <input style="border:0px">
            </header>

            <section class="section">
                <div class="label">중식</div>
                <div id="menu" class="menu" aria-label="중식 메뉴">X
                </div>
            </section>
            
            <div style="height:10vh;"></div>

            <section class="section">
                <div class="label">석식</div>
                <div class="menu" id="menuD" aria-label="석식 메뉴">X
                </div>
            </section>
        </main>
    </div>

            // document.getElementById('title').innerHTML = 
        };

        lunchNoticeAlert();

    </script>
</body>

</html>
